- hosts: app
  become: true

  tasks:
    - name: Deploy application safely
      block:
        - name: Copy application file
          ansible.builtin.unarchive:
            src: /tmp/frontend.zip
            dest: /app
        - name: Restart application
          ansible.builtin.service:
            name: myapp
            state: restarted

        - name: Wait for app health
          ansible.builtin.uri:
            url: http://localhost:8080/health
          register: health
          retries: 5
          delay: 10
          until: health.status == 200

      rescue:
        - name: Rollback application
          ansible.builtin.shell: /opt/app/rollback.sh

      always:
        - name: Cleanup temp files
          ansible.builtin.file:
            path: /tmp/frontend.zip
            state: absent



# ignore_errors --->	Continue playbook even if task fails
# failed_when ---->	Custom condition to mark task failed
# changed_when ---->	Custom condition to mark task changed
# block --->	Group tasks together
# rescue ---> 	Run if task inside block fails
# always --->	Run whether block succeeds or fails
# retries --->	Number of retry attempts
# delay --->	Seconds to wait between retries
# until --->	Retry until condition becomes true